<div class="modal-overlay">
    <div class="modal-content">
        <h3>{{ product ? 'Editar Producto' : 'Crear Nuevo Producto' }}</h3>
        <form (submit)="onSubmit()">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" [(ngModel)]="newProduct().nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label>Precio:</label>
                <input type="number" [(ngModel)]="newProduct().precio" name="precio" required>
            </div>
            <div class="form-group">
                <label>Descripción:</label>
                <textarea [(ngModel)]="newProduct().descripcion" name="descripcion" required></textarea>
            </div>
            <div class="form-group">
                <label>Stock:</label>
                <input type="number" [(ngModel)]="newProduct().stock" name="stock" required>
            </div>
            <div class="form-group">
                <label>Categoría:</label>
                <input type="text" [(ngModel)]="newProduct().categoria" name="categoria" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" (click)="onClose()">Cancelar</button>
                <button type="submit" class="btn-save">Guardar</button>
            </div>
        </form>
    </div>
</div>
